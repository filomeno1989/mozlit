<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta — MozLit</title>
  <link rel="icon" href="assets/img/logo.svg">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <header class="site-header" id="site-header"></header>

  <main class="container-sm auth-page">
    <div class="card">
      <div class="card__header auth-card__header">
        <div class="auth-card__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </div>
        <p class="card__title">Criar Conta</p>
        <p class="card__description">Junte-se à comunidade literária moçambicana.</p>
      </div>
      <div class="card__content">
        <form id="register-form">
          <div class="field-error hidden" id="register-error"></div>

          <div class="field">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" placeholder="Seu nome" required>
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="seu@email.com" required>
          </div>

          <div class="field">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required minlength="6">
          </div>

          <div class="field">
            <label>Quero me registar como</label>
            <div class="pill-group">
              <button type="button" class="pill is-active" data-role="LEITOR" id="role-leitor">Leitor</button>
              <button type="button" class="pill" data-role="ESCRITOR" id="role-escritor">Escritor</button>
            </div>
            <p class="field-hint">Escritores podem publicar e vender as suas obras.</p>
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="register-submit">Criar Conta</button>

          <p class="text-center text-muted mt-4" style="font-size:.875rem;">
            Já tem conta? <a href="login.html" class="btn-link" style="font-weight:500;">Entrar</a>
          </p>
        </form>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    let selectedRole = 'LEITOR';

    document.addEventListener('DOMContentLoaded', async () => {
      await initHeader('register');
      initFooter();

      const session = await getSession();
      if (session) window.location.href = 'index.html';

      document.querySelectorAll('[data-role]').forEach((btn) => {
        btn.addEventListener('click', () => {
          selectedRole = btn.dataset.role;
          document.querySelectorAll('[data-role]').forEach((b) => b.classList.remove('is-active'));
          btn.classList.add('is-active');
        });
      });
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorBox = document.getElementById('register-error');
      const submitBtn = document.getElementById('register-submit');
      errorBox.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Criando conta...';

      try {
        await registerUser({
          nome: document.getElementById('nome').value,
          email: document.getElementById('email').value,
          senha: document.getElementById('senha').value,
          role: selectedRole,
        });
        // Se a confirmação de email estiver ativada no Supabase, avisamos o usuário.
        alert('Conta criada! Se pedirmos confirmação por email, verifique a sua caixa de entrada antes de entrar.');
        window.location.href = 'login.html';
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Criar Conta';
      }
    });
  </script>
</body>
</html>
