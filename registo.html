<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta — MozLit</title>
  <link rel="icon" href="assets/img/logo.svg">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <header class="site-header" id="site-header"></header>

  <main class="container-sm auth-page">
    <div class="card">
      <div class="card__header auth-card__header">
        <div class="auth-card__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </div>
        <p class="card__title">Criar Conta</p>
        <p class="card__description">Junte-se à comunidade literária moçambicana.</p>
      </div>
      <div class="card__content">
        <form id="register-form">
          <div class="field-error hidden" id="register-error"></div>

          <div class="field">
            <label for="nome">Como devemos chamar-te?</label>
            <input type="text" id="nome" placeholder="Seu nome completo" required>
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="seu@email.com" required>
          </div>

          <div class="field">
            <label for="telefone">Contacto Telefónico (opcional p/ M-Pesa)</label>
            <input type="text" id="telefone" placeholder="84 228 0793" inputmode="tel">
          </div>

          <div class="field">
            <label for="perfil">Perfil</label>
            <select id="perfil">
              <option value="LEITOR">Leitor: Quero descobrir e ler obras</option>
              <option value="ESCRITOR">Escritor: Quero publicar e vender as minhas obras</option>
            </select>
          </div>

          <div class="field">
            <label for="senha">Senha (mín. 6 caracteres)</label>
            <input type="password" id="senha" placeholder="••••••••" required minlength="6">
          </div>

          <div class="field">
            <label for="senha_confirmar">Confirmar Senha</label>
            <input type="password" id="senha_confirmar" placeholder="••••••••" required minlength="6">
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="register-submit">Começar a Ler</button>

          <p class="text-center text-muted mt-4" style="font-size:.875rem;">
            Já fazes parte da família? <a href="login.html" class="btn-link" style="font-weight:500;">Entrar</a>
          </p>
        </form>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await initHeader('register');
      initFooter();

      const session = await getSession();
      if (session) window.location.href = 'index.html';
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorBox = document.getElementById('register-error');
      const submitBtn = document.getElementById('register-submit');
      errorBox.classList.add('hidden');

      const senha = document.getElementById('senha').value;
      const senhaConfirmar = document.getElementById('senha_confirmar').value;

      if (senha !== senhaConfirmar) {
        errorBox.textContent = 'As senhas não coincidem.';
        errorBox.classList.remove('hidden');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Criando conta...';

      try {
        await registerUser({
          nome: document.getElementById('nome').value,
          email: document.getElementById('email').value,
          telefone: document.getElementById('telefone').value,
          senha,
          role: document.getElementById('perfil').value,
        });
        window.location.href = 'index.html';
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Começar a Ler';
      }
    });
  </script>
</body>
</html>
