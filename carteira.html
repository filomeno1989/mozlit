<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carteira — MozLit</title>
  <link rel="icon" href="assets/img/logo.svg">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <header class="site-header" id="site-header"></header>

  <main class="container-sm py-8">
    <h1 style="font-size:1.5rem; font-weight:700; margin-bottom:1.5rem;">Carteira</h1>

    <!-- Saldo -->
    <div class="card balance-card mb-6">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M2 10h20"/></svg>
      <p class="text-muted" style="font-size:.875rem;">Saldo Disponível</p>
      <p class="balance-card__value" id="balance-value">0.00 <span style="font-size:1.125rem;">MZN</span></p>
    </div>

    <!-- Carregar saldo -->
    <div class="card">
      <div class="card__header">
        <p class="card__title" style="display:flex; align-items:center; gap:.5rem;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          Carregar Saldo
        </p>
      </div>
      <div class="card__content">
        <div class="pill-group mb-4" style="gap:.5rem;">
          <button type="button" class="btn btn-primary" id="deposit-mpesa" style="flex:1;">M-Pesa</button>
          <button type="button" class="btn btn-outline" id="deposit-nib" style="flex:1;">NIB / Transferência</button>
        </div>
        <div class="flex gap-2">
          <input type="number" step="0.01" min="0" id="deposit-amount" placeholder="Valor (MZN)" style="flex:1; border:1px solid var(--input); border-radius:var(--radius-md); padding:.5rem .75rem; font-size:.875rem; background-color:var(--background); color:var(--foreground);">
          <button class="btn btn-primary" id="deposit-submit">Carregar</button>
        </div>
        <p class="field-hint mt-2">Simulação: o saldo será adicionado instantaneamente.</p>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/carteira.js"></script>
</body>
</html>
