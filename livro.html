<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Livro — MozLit</title>
  <link rel="icon" href="assets/img/logo.svg">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <header class="site-header" id="site-header"></header>

  <main class="container-lg py-8" id="book-detail-root">
    <!-- Preenchido dinamicamente por livro.js -->
    <div class="skeleton" style="height:2rem; width:8rem; margin-bottom:1.5rem;"></div>
    <div class="flex gap-4" style="flex-wrap:wrap;">
      <div class="skeleton" style="width:16rem; aspect-ratio:3/4; border-radius:var(--radius-lg);"></div>
      <div style="flex:1; min-width:250px;">
        <div class="skeleton" style="height:2rem; width:75%; margin-bottom:1rem;"></div>
        <div class="skeleton" style="height:1rem; width:33%; margin-bottom:1rem;"></div>
        <div class="skeleton" style="height:5rem; width:100%;"></div>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/livro.js"></script>
</body>
</html>
