<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Obra — MozLit</title>
  <link rel="icon" href="assets/img/logo.svg">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <header class="site-header" id="site-header"></header>

  <main class="container-sm py-8">
    <a href="painel-autor.html" class="btn btn-ghost btn-sm mb-4">← Voltar</a>

    <div class="card">
      <div class="card__header">
        <p class="card__title">Nova Obra</p>
        <p class="card__description">Crie uma nova obra literária.</p>
      </div>
      <div class="card__content">
        <form id="new-book-form">
          <div class="field-error hidden" id="new-book-error"></div>

          <div class="field">
            <label for="titulo">Título</label>
            <input type="text" id="titulo" placeholder="Título da obra" required>
          </div>

          <div class="field">
            <label for="sinopse">Sinopse</label>
            <textarea id="sinopse" rows="4" placeholder="Descreva brevemente a obra..." required></textarea>
          </div>

          <div class="field">
            <label>Categoria</label>
            <div class="pill-group" id="category-picker"></div>
          </div>

          <div class="field">
            <label for="capa_url">URL da Capa</label>
            <input type="url" id="capa_url" placeholder="https://exemplo.com/capa.jpg">
            <img id="cover-preview" class="hidden" style="margin-top:.5rem; width:6rem; aspect-ratio:3/4; object-fit:cover; border-radius:var(--radius-md); border:1px solid var(--border);">
          </div>

          <div class="field">
            <label for="preco_total">Preço do Livro Completo (MZN)</label>
            <input type="number" id="preco_total" step="0.01" min="0" placeholder="0.00">
            <p class="field-hint">Deixe 0 ou vazio se quiser vender apenas capítulos avulsos.</p>
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="new-book-submit">Criar Obra</button>
        </form>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/novo-livro.js"></script>
</body>
</html>
