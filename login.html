<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — MozLit</title>
  <link rel="icon" href="assets/img/logo.svg">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <header class="site-header" id="site-header"></header>

  <main class="container-sm auth-page">
    <div class="card">
      <div class="card__header auth-card__header">
        <div class="auth-card__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </div>
        <p class="card__title">Entrar no MozLit</p>
        <p class="card__description">Acesse sua conta para ler e publicar obras.</p>
      </div>
      <div class="card__content">
        <form id="login-form">
          <div class="field-error hidden" id="login-error"></div>

          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="seu@email.com" required>
          </div>

          <div class="field">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="login-submit">Entrar</button>

          <p class="text-center text-muted mt-4" style="font-size:.875rem;">
            Não tem conta? <a href="registo.html" class="btn-link" style="font-weight:500;">Criar conta</a>
          </p>
        </form>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await initHeader('login');
      initFooter();

      // Se já estiver logado, manda direto para a home
      const session = await getSession();
      if (session) window.location.href = 'index.html';
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorBox = document.getElementById('login-error');
      const submitBtn = document.getElementById('login-submit');
      errorBox.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Entrando...';

      try {
        await loginUser({
          email: document.getElementById('email').value,
          senha: document.getElementById('senha').value,
        });
        window.location.href = 'index.html';
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
